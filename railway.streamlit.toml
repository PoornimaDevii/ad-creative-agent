[build]
builder = "nixpacks"

[deploy]
startCommand = "streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.variables]
PORT = "8501"
# Set this to the public URL of your deployed MCP server service on Railway
# e.g. MCP_SERVER_URL = "https://your-mcp-service.up.railway.app/sse"
MCP_SERVER_URL = ""

[build]
builder = "nixpacks"

[deploy]
startCommand = "streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Set these in the Railway dashboard under service variables:
# GEMINI_API_KEY = "..."
# MCP_SERVER_URL = "https://your-mcp-service.up.railway.app/sse"
